name: Bug report
description: Report a reproducible issue in geo-effect-kit.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide a minimal reproduction or steps to reproduce.
      placeholder: |
        1. Install @ztgkzhaohao/geo-effect-kit
        2. Create a Cesium Viewer
        3. Call createRadarScanEffect(viewer, { center: { longitude: 116.391, latitude: 39.907 }, radiusMeters: 22000 })
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: geo-effect-kit, Cesium, browser, Node.js, package manager.
      placeholder: "@ztgkzhaohao/geo-effect-kit 0.1.0, Cesium 1.136.0, Chrome 126"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console output
      description: Paste relevant terminal or browser console output.
      render: text
