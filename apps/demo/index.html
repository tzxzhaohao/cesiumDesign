<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>geo-effect-kit examples</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <nav class="example-nav" aria-label="Effect examples">
        <a class="brand" href="/">
          <span class="brand-mark"></span>
          <span>
            <strong>geo-effect-kit</strong>
            <small>Cesium effects</small>
          </span>
        </a>
        <div class="nav-section">
          <span class="nav-label">Examples</span>
          <button class="effect-tab active" type="button" data-effect="polyline-flow">
            <span>polyline-flow</span>
            <small>dispatch route light</small>
          </button>
          <button class="effect-tab" type="button" data-effect="material-polyline">
            <span>material-polyline</span>
            <small>texture and dash lines</small>
          </button>
          <button class="effect-tab" type="button" data-effect="fly-line">
            <span>fly-line</span>
            <small>raised arc animation</small>
          </button>
          <button class="effect-tab" type="button" data-effect="pipe-flow">
            <span>pipe-flow</span>
            <small>transparent water pipe</small>
          </button>
          <button class="effect-tab" type="button" data-effect="scene-weather">
            <span>scene-weather</span>
            <small>rain snow fog lightning</small>
          </button>
          <button class="effect-tab" type="button" data-effect="post-process">
            <span>post-process</span>
            <small>screen color effects</small>
          </button>
          <button class="effect-tab" type="button" data-effect="water-surface">
            <span>water-surface</span>
            <small>animated water shader</small>
          </button>
          <button class="effect-tab" type="button" data-effect="light-wall">
            <span>light-wall</span>
            <small>dynamic perimeter wall</small>
          </button>
          <button class="effect-tab" type="button" data-effect="scan-cone">
            <span>scan-cone</span>
            <small>volumetric scanner</small>
          </button>
          <button class="effect-tab" type="button" data-effect="route-scan">
            <span>route-scan</span>
            <small>moving scanner route</small>
          </button>
          <button class="effect-tab" type="button" data-effect="shield-dome">
            <span>shield-dome</span>
            <small>energy protection shell</small>
          </button>
          <button class="effect-tab" type="button" data-effect="temperature-field">
            <span>temperature-field</span>
            <small>shader risk surface</small>
          </button>
          <button class="effect-tab" type="button" data-effect="fire-billboard">
            <span>fire-billboard</span>
            <small>gif fire marker</small>
          </button>
          <button class="effect-tab" type="button" data-effect="radar-scan">
            <span>radar-scan</span>
            <small>rotating radar sweep</small>
          </button>
          <button class="effect-tab" type="button" data-effect="ripple-spread">
            <span>ripple-spread</span>
            <small>water ripple expansion</small>
          </button>
        </div>
      </nav>

      <main class="stage">
        <div id="cesiumContainer"></div>
        <section class="hud">
          <div class="hud-header">
            <div>
              <span id="effectId" class="eyebrow">radar-scan</span>
              <h1 id="effectTitle">Radar Scan</h1>
            </div>
            <button id="flyTo" class="icon-button" type="button" aria-label="Fly to effect" title="Fly to effect">⌖</button>
          </div>
          <p id="effectDescription" class="description">Circular Cesium ground primitive with animated radar sweep and optional rings.</p>

          <div class="control-grid">
            <label id="colorField">
              <span>Color</span>
              <input id="color" type="color" value="#36d6ff" />
            </label>
            <label id="radarTypeField">
              <span id="radarTypeLabel">Radar type</span>
              <select id="radarType">
                <option value="classic">classic</option>
                <option value="sector">sector</option>
                <option value="pulse">pulse</option>
                <option value="grid">grid</option>
              </select>
            </label>
            <label id="rippleTypeField" hidden>
              <span>Ripple type</span>
              <select id="rippleType">
                <option value="water">water</option>
                <option value="energy">energy</option>
                <option value="soft">soft</option>
              </select>
            </label>
            <label id="flowTypeField" hidden>
              <span>Flow type</span>
              <select id="flowType">
                <option value="dispatch">dispatch</option>
                <option value="migration">migration</option>
                <option value="attack">attack</option>
                <option value="comet">comet</option>
                <option value="electric">electric</option>
              </select>
            </label>
            <label id="materialPolylineCustomImageField" hidden>
              <span>Custom image URL</span>
              <input id="materialPolylineCustomImage" type="url" placeholder="/textures/material-polyline/neon-weave.png" />
            </label>
            <label id="materialPolylineShowcaseField" class="check-field" hidden>
              <input id="materialPolylineShowcase" type="checkbox" />
              <span>Show style showcase</span>
            </label>
            <label id="flyModeField" hidden>
              <span>Fly mode</span>
              <select id="flyMode">
                <option value="single-arc">single-arc</option>
                <option value="hub-spoke">hub-spoke</option>
                <option value="bidirectional">bidirectional</option>
              </select>
            </label>
            <label id="wallTypeField" hidden>
              <span>Wall type</span>
              <select id="wallType">
                <option value="security">security</option>
                <option value="warning">warning</option>
                <option value="data">data</option>
                <option value="fence">fence</option>
                <option value="pulse">pulse</option>
              </select>
            </label>
            <label id="coneTypeField" hidden>
              <span>Cone type</span>
              <select id="coneType">
                <option value="searchlight">searchlight</option>
                <option value="radar">radar</option>
                <option value="camera">camera</option>
                <option value="drone">drone</option>
                <option value="alarm">alarm</option>
              </select>
            </label>
            <label id="coneExpansionField" class="check-row" hidden>
              <input id="coneExpansion" type="checkbox" checked />
              <span>Smooth expansion</span>
            </label>
            <label id="domeTypeField" hidden>
              <span>Dome type</span>
              <select id="domeType">
                <option value="hex">hex</option>
                <option value="plasma">plasma</option>
                <option value="matrix">matrix</option>
                <option value="aegis">aegis</option>
                <option value="storm">storm</option>
              </select>
            </label>
            <label id="weatherTypeField" hidden>
              <span>Weather type</span>
              <select id="weatherType">
                <option value="rain">rain</option>
                <option value="snow">snow</option>
                <option value="fog">fog</option>
                <option value="lightning">lightning</option>
              </select>
            </label>
            <label id="postProcessTypeField" hidden>
              <span>Post effect</span>
              <select id="postProcessType">
                <option value="bloom">bloom</option>
                <option value="night-vision">night-vision</option>
                <option value="black-white">black-white</option>
                <option value="brightness">brightness</option>
                <option value="mosaic">mosaic</option>
                <option value="depth-of-field">depth-of-field</option>
              </select>
            </label>
            <label id="waterTypeField" hidden>
              <span>Water type</span>
              <select id="waterType">
                <option value="river">river</option>
                <option value="lake">lake</option>
                <option value="flood">flood</option>
                <option value="flow">flow</option>
              </select>
            </label>
            <label id="radiusField">
              <span>Radius</span>
              <input id="radius" type="range" min="5000" max="90000" step="1000" value="5000" />
              <output id="radiusValue">5,000 m</output>
            </label>
            <label id="widthField" hidden>
              <span>Width</span>
              <input id="width" type="range" min="1" max="256" step="1" value="7" />
              <output id="widthValue">7 px</output>
            </label>
            <label id="heightField" hidden>
              <span>Height</span>
              <input id="height" type="range" min="8" max="64000" step="1" value="3600" />
              <output id="heightValue">3,600 m</output>
            </label>
            <label id="lengthField" hidden>
              <span>Length</span>
              <input id="length" type="range" min="1000" max="14000" step="100" value="6200" />
              <output id="lengthValue">6,200 m</output>
            </label>
            <label id="coneMaxRadiusField" hidden>
              <span>Expansion radius</span>
              <input id="coneMaxRadius" type="range" min="1000" max="90000" step="1000" value="20000" />
              <output id="coneMaxRadiusValue">20,000 m</output>
            </label>
            <label id="coneExpansionDurationField" hidden>
              <span>Expansion duration</span>
              <input id="coneExpansionDuration" type="range" min="1000" max="12000" step="100" value="4500" />
              <output id="coneExpansionDurationValue">4,500 ms</output>
            </label>
            <label id="speedField" hidden>
              <span>Speed</span>
              <input id="speed" type="range" min="0.05" max="5" step="0.05" value="0.05" />
              <output id="speedValue">0.05x</output>
            </label>
            <label id="scaleField" hidden>
              <span>Scale</span>
              <input id="scale" type="range" min="0.2" max="4" step="0.05" value="1" />
              <output id="scaleValue">1.00x</output>
            </label>
            <label id="scanDurationField">
              <span>Sweep duration</span>
              <input id="scanDuration" type="range" min="800" max="9000" step="100" value="3600" />
              <output id="scanDurationValue">3,600 ms</output>
            </label>
            <label id="frameIntervalField" hidden>
              <span>Frame interval</span>
              <input id="frameInterval" type="range" min="16" max="300" step="4" value="80" />
              <output id="frameIntervalValue">80 ms</output>
            </label>
            <label id="ringCountField" hidden>
              <span>Ripple rings</span>
              <input id="ringCount" type="range" min="1" max="12" step="1" value="4" />
              <output id="ringCountValue">4 rings</output>
            </label>
            <label id="durationField" hidden>
              <span>Ripple duration</span>
              <input id="duration" type="range" min="600" max="9000" step="100" value="3200" />
              <output id="durationValue">3,200 ms</output>
            </label>
            <label id="trailLengthField" hidden>
              <span>Trail length</span>
              <input id="trailLength" type="range" min="0.02" max="0.95" step="0.01" value="0.32" />
              <output id="trailLengthValue">0.32</output>
            </label>
            <label id="pulseCountField" hidden>
              <span>Pulse count</span>
              <input id="pulseCount" type="range" min="1" max="12" step="1" value="3" />
              <output id="pulseCountValue">3 pulses</output>
            </label>
            <label id="cornerRadiusField" hidden>
              <span>Corner radius</span>
              <input id="cornerRadius" type="range" min="0" max="0.45" step="0.01" value="0" />
              <output id="cornerRadiusValue">0.00</output>
            </label>
            <label id="pipeOpacityField" hidden>
              <span>Pipe opacity</span>
              <input id="pipeOpacity" type="range" min="0" max="1" step="0.01" value="0.32" />
              <output id="pipeOpacityValue">0.32</output>
            </label>
            <label id="bubbleDensityField" hidden>
              <span>Bubbles</span>
              <input id="bubbleDensity" type="range" min="0" max="16" step="1" value="6" />
              <output id="bubbleDensityValue">6 bubbles</output>
            </label>
            <label id="scanLineCountField" hidden>
              <span>Scan lines</span>
              <input id="scanLineCount" type="range" min="1" max="16" step="1" value="4" />
              <output id="scanLineCountValue">4 lines</output>
            </label>
            <label id="gridDensityField" hidden>
              <span>Grid density</span>
              <input id="gridDensity" type="range" min="2" max="40" step="1" value="14" />
              <output id="gridDensityValue">14 cells</output>
            </label>
            <label id="pulseStrengthField" hidden>
              <span>Pulse strength</span>
              <input id="pulseStrength" type="range" min="0" max="1" step="0.01" value="0.72" />
              <output id="pulseStrengthValue">0.72</output>
            </label>
            <label id="waveStrengthField" hidden>
              <span>Wave strength</span>
              <input id="waveStrength" type="range" min="0" max="1" step="0.01" value="0.48" />
              <output id="waveStrengthValue">0.48</output>
            </label>
            <label id="reflectionStrengthField" hidden>
              <span>Reflection</span>
              <input id="reflectionStrength" type="range" min="0" max="1" step="0.01" value="0.36" />
              <output id="reflectionStrengthValue">0.36</output>
            </label>
            <label id="distortionScaleField" hidden>
              <span>Distortion</span>
              <input id="distortionScale" type="range" min="0" max="64" step="1" value="18" />
              <output id="distortionScaleValue">18</output>
            </label>
            <label id="reflectivityField" hidden>
              <span>Reflectivity</span>
              <input id="reflectivity" type="range" min="0" max="1" step="0.01" value="0.58" />
              <output id="reflectivityValue">0.58</output>
            </label>
            <label id="refractionStrengthField" hidden>
              <span>Refraction</span>
              <input id="refractionStrength" type="range" min="0" max="1" step="0.01" value="0.42" />
              <output id="refractionStrengthValue">0.42</output>
            </label>
            <label id="fresnelPowerField" hidden>
              <span>Fresnel power</span>
              <input id="fresnelPower" type="range" min="1" max="12" step="0.1" value="4" />
              <output id="fresnelPowerValue">4.0</output>
            </label>
            <label id="headingField" hidden>
              <span>Heading</span>
              <input id="heading" type="range" min="0" max="360" step="1" value="0" />
              <output id="headingValue">0 deg</output>
            </label>
            <label id="windDirectionField" hidden>
              <span>Wind direction</span>
              <input id="windDirection" type="range" min="0" max="360" step="1" value="115" />
              <output id="windDirectionValue">115 deg</output>
            </label>
            <label id="apertureField" hidden>
              <span>Aperture</span>
              <input id="aperture" type="range" min="8" max="120" step="1" value="34" />
              <output id="apertureValue">34 deg</output>
            </label>
            <label id="opacityField">
              <span>Opacity</span>
              <input id="opacity" type="range" min="0" max="1" step="0.01" value="0.85" />
              <output id="opacityValue">0.85</output>
            </label>
            <label id="ringsField" class="check-row">
              <input id="rings" type="checkbox" checked />
              <span>Show radar rings</span>
            </label>
            <label id="centerField" class="check-row">
              <input id="center" type="checkbox" />
              <span>Show center point</span>
            </label>
            <label id="breathingField" class="check-row" hidden>
              <input id="breathing" type="checkbox" checked />
              <span>Breathing highlight</span>
            </label>
            <label id="outlineField" class="check-row" hidden>
              <input id="outline" type="checkbox" checked />
              <span id="outlineLabel">Show top outline</span>
            </label>
            <label id="originField" class="check-row" hidden>
              <input id="origin" type="checkbox" checked />
              <span>Show origin point</span>
            </label>
            <label id="coneCameraFollowField" class="check-row" hidden>
              <input id="coneCameraFollow" type="checkbox" checked />
              <span>Smart camera follow</span>
            </label>
            <div id="coneExpansionActions" class="cone-expansion-actions" hidden>
              <button id="restartConeExpansion" class="cone-expansion-action" type="button">Restart expansion</button>
              <button id="cancelConeExpansion" class="cone-expansion-action" type="button">Cancel expansion</button>
              <div
                id="coneExpansionState"
                class="cone-expansion-status"
                role="progressbar"
                aria-label="Scan cone expansion"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
                aria-valuetext="status ready · radius 0 m · height 0 m · 0%"
              >status ready · radius 0 m · height 0 m · 0%</div>
              <p id="coneExpansionAnnouncement" class="sr-only" aria-live="polite" aria-atomic="true"></p>
            </div>
            <label id="domeRingField" class="check-row" hidden>
              <input id="domeRing" type="checkbox" checked />
              <span>Show base ring</span>
            </label>
          </div>
        </section>

        <aside class="docs-panel">
          <div class="docs-tabs" role="tablist" aria-label="Effect details">
            <button class="docs-tab active" type="button" data-doc-tab="usage">Usage</button>
            <button class="docs-tab" type="button" data-doc-tab="notes">Notes</button>
          </div>
          <div id="usageToolbar" class="usage-toolbar">
            <div class="template-tabs scroll-panel" role="tablist" aria-label="Code template">
              <button class="template-tab active" type="button" data-code-template="typescript" aria-selected="true">TypeScript</button>
              <button class="template-tab" type="button" data-code-template="react" aria-selected="false">React</button>
              <button class="template-tab" type="button" data-code-template="vue" aria-selected="false">Vue</button>
            </div>
            <button id="copyCode" class="copy-code-button" type="button">Copy</button>
          </div>
          <pre id="codeExample" class="code-block scroll-panel"></pre>
          <div id="notesPanel" class="notes scroll-panel" hidden></div>
        </aside>
      </main>
    </div>
  </body>
</html>
